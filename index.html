<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Sumi ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Petals -->
    <div id="petalContainer"></div>

    <!-- Main Container -->
    <div class="container">

        <h1 class="title">
            A Little Surprise Just For You 💖
        </h1>

        <!-- Gift -->
        <div id="giftBox">

            <img
                id="giftImg"
                src="images/gift.png"
                alt="Gift">

            <div id="magicGlow"></div>

        </div>

        <!-- Love Reveal -->
        <div id="loveReveal">

            <h1>I LOVE YOU ❤️</h1>

            <p>My Sumi 🌸</p>

        </div>

        <!-- Fox -->
        <div id="fox">

            <img
                src="images/fox.png"
                alt="Cute Fox">

            <div id="heartButton"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
